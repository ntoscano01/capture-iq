<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — CaptureIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .login-card {
      max-width: 400px; margin: 80px auto;
      border: none; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
    }
    .login-header {
      background: #003087; color: #fff;
      border-radius: 12px 12px 0 0;
      padding: 2rem; text-align: center;
    }
    .login-header h1 { font-size: 1.4rem; font-weight: 700; margin: .5rem 0 0; }
    .login-header small { color: rgba(255,255,255,.7); font-size: .8rem; }
  </style>
</head>
<body>

<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-rocket-takeoff-fill text-warning fs-2"></i>
    <h1>CaptureIQ</h1>
    <small>SBIR Capture Pipeline</small>
  </div>
  <div class="card-body p-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.88rem">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.85rem">Username</label>
        <input type="text" name="username" class="form-control" autofocus required
               placeholder="Enter your username">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.85rem">Password</label>
        <input type="password" name="password" class="form-control" required
               placeholder="Enter your password">
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="remember" value="1" id="rememberMe">
        <label class="form-check-label" for="rememberMe" style="font-size:.85rem">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="background:#003087; border-color:#003087">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
