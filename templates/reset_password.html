<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — CaptureIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .card {
      max-width: 420px; margin: 80px auto;
      border: none; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
    }
    .card-header {
      background: #003087; color: #fff;
      border-radius: 12px 12px 0 0;
      padding: 1.75rem 2rem; text-align: center;
    }
    .card-header h1 { font-size: 1.3rem; font-weight: 700; margin: .4rem 0 0; }
    .card-header small { color: rgba(255,255,255,.7); font-size: .8rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <i class="bi bi-key-fill text-warning fs-2"></i>
    <h1>Reset Password</h1>
    <small>Choose a new password for <strong>{{ username }}</strong></small>
  </div>
  <div class="card-body p-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.88rem">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.85rem">New Password</label>
        <input type="password" name="password" id="pw" class="form-control" required
               placeholder="Enter new password" autofocus
               oninput="checkStrength(this.value)">
        <div class="progress mt-2" style="height:4px">
          <div id="strength-bar" class="progress-bar" style="width:0%; transition:width .3s"></div>
        </div>
        <div id="strength-label" class="form-text text-muted" style="font-size:.75rem"></div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:.85rem">Confirm Password</label>
        <input type="password" name="confirm" class="form-control" required
               placeholder="Re-enter new password">
      </div>
      <button type="submit" class="btn btn-primary w-100"
              style="background:#003087; border-color:#003087">
        <i class="bi bi-check-lg me-1"></i> Set New Password
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('login') }}" class="text-muted" style="font-size:.82rem">
        <i class="bi bi-arrow-left me-1"></i>Back to Sign In
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function checkStrength(pw) {
  const bar   = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    { w: '20%',  cls: 'bg-danger',  txt: 'Very weak' },
    { w: '40%',  cls: 'bg-danger',  txt: 'Weak' },
    { w: '60%',  cls: 'bg-warning', txt: 'Fair' },
    { w: '80%',  cls: 'bg-info',    txt: 'Good' },
    { w: '100%', cls: 'bg-success', txt: 'Strong' },
  ];
  const lvl = levels[Math.min(score, 4)];
  bar.style.width = pw.length ? lvl.w : '0%';
  bar.className   = 'progress-bar ' + (pw.length ? lvl.cls : '');
  label.textContent = pw.length ? lvl.txt : '';
}
</script>
</body>
</html>
