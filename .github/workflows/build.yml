name: Build CaptureIQ

# ── Triggers ──────────────────────────────────────────────────────────────────
# • Every push to main  → builds all platforms, uploads as downloadable artifacts
# • Push of a v* tag    → same build + creates a public GitHub Release with zips attached
# • Manual trigger      → run any time from the Actions tab
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# ── Build job ─────────────────────────────────────────────────────────────────
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1/M2/M3) — macos-14 runner is arm64
          - os: macos-14
            spec: CaptureIQ.spec
            artifact: CaptureIQ-mac-arm64
            zip_name: CaptureIQ-mac-AppleSilicon.zip

          # Intel Mac — macos-13 runner is x86_64
          - os: macos-13
            spec: CaptureIQ.spec
            artifact: CaptureIQ-mac-intel
            zip_name: CaptureIQ-mac-Intel.zip

          # Windows
          - os: windows-latest
            spec: CaptureIQ_windows.spec
            artifact: CaptureIQ-windows
            zip_name: CaptureIQ-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.zip_name }} CaptureIQ.app

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\CaptureIQ -DestinationPath ${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
          retention-days: 30

  # ── Release job (only runs when a v* tag is pushed) ─────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          name: CaptureIQ ${{ github.ref_name }}
