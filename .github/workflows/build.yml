name: Build CaptureIQ

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warnings

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            spec: CaptureIQ.spec
            artifact: CaptureIQ-mac
            zip_name: CaptureIQ-mac.zip

          - os: windows-2025
            spec: CaptureIQ_windows.spec
            artifact: CaptureIQ-windows
            zip_name: CaptureIQ-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller ${{ matrix.spec }} --noconfirm

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.zip_name }} CaptureIQ.app

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\CaptureIQ -DestinationPath ${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          name: CaptureIQ ${{ github.ref_name }}
